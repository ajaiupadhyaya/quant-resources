# Jupyter Book 2 / MyST project config
# https://mystmd.org/guide/quickstart

version: 1

project:
  id: quant-resources
  title: Quant Guild Study Library
  description: Lecture notebooks from Quant Guild — organized for study and review
  authors:
    - name: Ajai Upadhyaya
  github: https://github.com/ajaiupadhyaya/quant-resources
  license: CC-BY-4.0
  exclude:
    - "**/.ipynb_checkpoints/**"
    - "**/node_modules/**"
    - _build/**
    - .venv/**
    # Source notebooks; site builds from polished copies in _publish/
    - "2025 Video Lectures/**"
    - "2026 Video Lectures/**"
  jupyter:
    binder:
      repo: ajaiupadhyaya/quant-resources
      ref: main
      url: https://mybinder.org
  settings:
    output_matplotlib_strings: remove

extends:
  - toc.yml

site:
  template: book-theme
  title: Quant Guild Study Library
  options:
    logo_text: Quant Guild Study Library
    style: assets/site.css
    folders: true
    outline_maxdepth: 3
  nav:
    - title: GitHub
      url: https://github.com/ajaiupadhyaya/quant-resources
    - title: Quant Guild
      url: https://quantguild.com
    - title: Official library
      url: https://github.com/romanmichaelpaolucci/Quant-Guild-Library
